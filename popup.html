<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPM Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">$</div>
      <h1>CPM Calculator</h1>
      <p class="subtitle">Calculate Cost Per Thousand Impressions</p>
    </div>

    <div class="content">
      <div class="input-section">
        <div class="input-group">
          <label for="totalCost">Total Cost ($)</label>
          <input type="number" id="totalCost" placeholder="Enter total cost" step="0.01" min="0">
        </div>

        <div class="input-group">
          <label for="totalImpressions">Total Impressions</label>
          <input type="number" id="totalImpressions" placeholder="Enter total impressions" min="0">
        </div>
      </div>

      <button id="calculateBtn" class="calculate-btn">Calculate CPM</button>

      <div id="result" class="result hidden">
        <div class="result-label">CPM VALUE</div>
        <div id="cpmValue" class="result-value">$0.00</div>
        <div class="formula">CPM = (Total Cost / Total Impressions) × 1000</div>
      </div>

      <div class="divider"></div>

      <p class="help-text">Tip: CPM measures the cost of 1,000 ad impressions</p>

      <div id="error" class="error hidden"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
