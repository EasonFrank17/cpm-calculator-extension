<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPM Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>CPM 计算器</h1>
    <p class="subtitle">计算每千次展示成本</p>

    <div class="input-group">
      <label for="totalCost">总花费 ($)</label>
      <input type="number" id="totalCost" placeholder="请输入总花费" step="0.01" min="0">
    </div>

    <div class="input-group">
      <label for="totalImpressions">总展示量</label>
      <input type="number" id="totalImpressions" placeholder="请输入总展示量" min="0">
    </div>

    <button id="calculateBtn" class="calculate-btn">计算 CPM</button>

    <div id="result" class="result hidden">
      <div class="result-label">CPM 值</div>
      <div id="cpmValue" class="result-value">$0.00</div>
      <div class="formula">CPM = (总花费 / 总展示量) × 1000</div>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
